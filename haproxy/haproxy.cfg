global
  log stdout format raw local0
  maxconn 1024

defaults
  log global
  mode http
  option httplog
  option forwardfor
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend https_in
  bind *:16443 ssl crt /tmp/haproxy-certs/haproxy.pem
  http-response set-header Strict-Transport-Security "max-age=31536000"
  default_backend web_backend

backend web_backend
  server web web:3000 check
